<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sankofa — Fragmentos da África</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0c0a06;
      --surface: #181410;
      --surface2: #231e16;
      --surface3: #302a1f;
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, .18);
      --gold-glow: rgba(201, 168, 76, .08);
      --terra: #b85a3a;
      --terra-dim: rgba(184, 90, 58, .18);
      --green: #4a8a50;
      --green-dim: rgba(74, 138, 80, .18);
      --indigo: #2a4570;
      --indigo-dim: rgba(42, 69, 112, .18);
      --text: #ede5d5;
      --text-dim: #9a8e7a;
      --text-muted: #5a5245;
      --danger: #c04040;
      --danger-dim: rgba(192, 64, 64, .18);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 20px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Lora', Georgia, serif;
      --ease: cubic-bezier(.4, 0, .2, 1);
      --dur: 280ms;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent
    }

    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg);
      min-height: 100dvh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: var(--font-display);
      font-weight: 700;
      line-height: 1.2
    }

    button {
      font-family: var(--font-body);
      cursor: pointer;
      border: none;
      outline: none
    }

    input {
      font-family: var(--font-body)
    }

    ::selection {
      background: var(--gold);
      color: var(--bg)
    }

    #app {
      max-width: 580px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100dvh;
      padding-bottom: 80px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity var(--dur) var(--ease), transform var(--dur) var(--ease)
    }

    #app.fade-out {
      opacity: 0;
      transform: translateY(12px)
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: var(--radius);
      font-size: 1rem;
      font-weight: 600;
      transition: all .25s var(--ease);
      letter-spacing: .02em
    }

    .btn-gold {
      background: var(--gold);
      color: var(--bg)
    }

    .btn-gold:hover {
      background: #d9be62;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--gold-dim)
    }

    .btn-gold:active {
      transform: translateY(0)
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold)
    }

    .btn-outline:hover {
      background: var(--gold-glow)
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--surface3)
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-muted)
    }

    .btn-sm {
      padding: 8px 18px;
      font-size: .85rem
    }

    .btn-block {
      width: 100%
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600
    }

    .badge-gold {
      background: var(--gold-dim);
      color: var(--gold)
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--terra));
      border-radius: 3px;
      transition: width .6s var(--ease)
    }

    .option {
      background: var(--surface);
      border: 2px solid var(--surface3);
      border-radius: var(--radius);
      padding: 14px 18px;
      cursor: pointer;
      transition: all .2s var(--ease);
      font-size: .95rem;
      line-height: 1.5;
      display: flex;
      align-items: center;
      user-select: none;
      -webkit-user-select: none
    }

    .option:hover:not(.correct):not(.wrong):not(.locked) {
      border-color: var(--gold);
      background: var(--gold-glow)
    }

    .option.selected {
      border-color: var(--gold);
      background: var(--gold-glow)
    }

    .option.correct {
      border-color: var(--green);
      background: var(--green-dim)
    }

    .option.wrong {
      border-color: var(--danger);
      background: var(--danger-dim);
      animation: shake .4s var(--ease)
    }

    .option.locked {
      pointer-events: none;
      opacity: .45
    }

    .option .opt-letter {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--surface3);
      font-weight: 700;
      font-size: .85rem;
      margin-right: 14px;
      flex-shrink: 0;
      transition: all .2s
    }

    .option.correct .opt-letter {
      background: var(--green);
      color: var(--bg)
    }

    .option.wrong .opt-letter {
      background: var(--danger);
      color: var(--bg)
    }

    .intro-line {
      font-family: var(--font-display);
      font-size: 1.35rem;
      line-height: 1.5;
      text-align: center;
      color: var(--text);
      font-style: italic;
      max-width: 420px;
      margin: 0 auto 24px;
      padding: 0 8px;
      letter-spacing: .01em
    }

    .context-area {
      margin: 0 0 20px;
      text-align: center
    }

    .context-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px dashed var(--text-muted);
      color: var(--text-muted);
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      cursor: pointer;
      transition: all .25s var(--ease)
    }

    .context-toggle:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-glow)
    }

    .context-toggle.open {
      border-color: var(--gold);
      color: var(--gold);
      border-style: solid
    }

    .context-panel {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height .5s var(--ease), opacity .4s var(--ease), margin .3s var(--ease);
      margin: 0
    }

    .context-panel.open {
      max-height: 500px;
      opacity: 1;
      margin-top: 12px
    }

    .context-content {
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 16px 18px;
      font-size: .92rem;
      line-height: 1.75;
      color: var(--text-dim);
      text-align: left
    }

    .context-content strong {
      color: var(--text)
    }

    .hint-box {
      background: var(--surface2);
      border-left: 3px solid var(--terra);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 10px 14px;
      margin-top: 8px;
      font-size: .86rem;
      color: var(--text-dim);
      animation: fadeUp .4s var(--ease)
    }

    .hint-btn {
      background: none;
      border: 1px dashed var(--text-muted);
      color: var(--text-muted);
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
      width: 100%;
      text-align: center
    }

    .hint-btn:hover {
      border-color: var(--terra);
      color: var(--terra)
    }

    .feedback {
      text-align: center;
      padding: 14px;
      border-radius: var(--radius);
      margin-bottom: 14px;
      font-weight: 600;
      animation: fadeUp .3s var(--ease)
    }

    .feedback.correct {
      background: var(--green-dim);
      color: var(--green);
      border: 1px solid rgba(74, 138, 80, .3)
    }

    .feedback.wrong {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid rgba(192, 64, 64, .3)
    }

    .fragment-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 320px;
      margin: 0 auto
    }

    .fragment {
      aspect-ratio: 1;
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      transition: all .5s var(--ease);
      display: flex;
      align-items: center;
      justify-content: center
    }

    .fragment.locked {
      background: var(--surface3);
      border: 2px dashed var(--text-muted)
    }

    .fragment.locked::after {
      content: '?';
      font-size: 1.8rem;
      color: var(--text-muted);
      font-family: var(--font-display)
    }

    .fragment.unlocked {
      border: 2px solid var(--gold);
      animation: fragmentReveal .8s var(--ease) both
    }

    .fragment .frag-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, .72);
      color: var(--text);
      font-size: .62rem;
      padding: 5px 4px;
      text-align: center
    }

    .fp-rift {
      background: radial-gradient(circle at 30% 40%, var(--terra) 0%, #7a3520 40%, #4a2010 100%)
    }

    .fp-saara {
      background: linear-gradient(135deg, var(--gold) 0%, #8a6a20 50%, #5a4510 100%)
    }

    .fp-ferro {
      background: linear-gradient(45deg, #6a4a2a 0%, #8a6030 30%, #4a3018 100%)
    }

    .fp-bantu {
      background: linear-gradient(180deg, var(--green) 0%, #2a4a28 100%)
    }

    .fp-arte {
      background: linear-gradient(225deg, var(--indigo) 0%, #1a2a40 100%)
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 88dvh;
      text-align: center;
      gap: 20px
    }

    .landing .bird {
      width: 110px;
      height: 110px;
      opacity: 0;
      animation: fadeScale .8s ease .2s forwards
    }

    .landing h1 {
      font-size: 2.8rem;
      letter-spacing: .18em;
      color: var(--gold);
      opacity: 0;
      animation: fadeUp .6s ease .5s forwards
    }

    .landing .subtitle {
      font-size: 1.05rem;
      color: var(--text-dim);
      font-style: italic;
      opacity: 0;
      animation: fadeUp .6s ease .7s forwards
    }

    .landing .tagline {
      font-size: .9rem;
      color: var(--text-muted);
      max-width: 340px;
      opacity: 0;
      animation: fadeUp .6s ease .9s forwards
    }

    .landing .cta {
      opacity: 0;
      animation: fadeUp .6s ease 1.1s forwards
    }

    .world-map {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 16px
    }

    .world-card {
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      transition: all .25s;
      position: relative;
      overflow: hidden
    }

    .world-card.unlocked {
      cursor: pointer;
      border-color: rgba(201, 168, 76, .15)
    }

    .world-card.unlocked:hover {
      border-color: var(--gold);
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .3)
    }

    .world-card.locked {
      opacity: .35;
      cursor: default
    }

    .world-card .world-num {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold)
    }

    .world-card.locked .world-num {
      color: var(--text-muted)
    }

    .world-card .world-name {
      font-size: .85rem;
      color: var(--text-dim);
      margin-top: 2px;
      font-weight: 600
    }

    .world-card .world-period {
      font-size: .7rem;
      color: var(--text-muted);
      margin-top: 2px
    }

    .world-card .lock-icon {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: .9rem;
      color: var(--text-muted)
    }

    .enigma-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px
    }

    .enigma-item {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-radius: var(--radius);
      padding: 14px 16px;
      cursor: pointer;
      transition: all .2s
    }

    .enigma-item:hover {
      border-color: var(--gold);
      transform: translateX(4px)
    }

    .en-num {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0
    }

    .en-num.available {
      background: var(--gold);
      color: var(--bg)
    }

    .en-num.solved {
      background: var(--green);
      color: var(--bg)
    }

    .en-num.locked {
      background: var(--surface3);
      color: var(--text-muted)
    }

    .enigma-item .en-info {
      flex: 1
    }

    .enigma-item .en-title {
      font-weight: 600;
      font-size: .95rem
    }

    .enigma-item .en-sub {
      font-size: .78rem;
      color: var(--text-dim);
      margin-top: 2px
    }

    .enigma-item .en-pts {
      font-size: .8rem;
      color: var(--gold);
      font-weight: 600;
      flex-shrink: 0
    }

    .result {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 18px;
      padding-top: 24px
    }

    .result .points-earned {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 900;
      color: var(--gold);
      animation: fadeScale .5s var(--ease)
    }

    .result .fragment-preview {
      width: 140px;
      height: 140px;
      border-radius: var(--radius-lg);
      border: 3px solid var(--gold);
      animation: fragmentReveal .8s var(--ease) .3s both
    }

    .result .explanation {
      font-size: .92rem;
      color: var(--text-dim);
      line-height: 1.7;
      text-align: left;
      background: var(--surface);
      padding: 18px;
      border-radius: var(--radius);
      border-left: 3px solid var(--gold)
    }

    .profile-header {
      text-align: center;
      padding: 16px 0
    }

    .profile-header .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--terra));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--bg);
      margin: 0 auto 10px
    }

    .profile-header h2 {
      font-size: 1.3rem
    }

    .profile-header .title {
      color: var(--gold);
      font-style: italic;
      font-size: .95rem
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 16px 0
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center
    }

    .stat-card .stat-val {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold)
    }

    .stat-card .stat-label {
      font-size: .75rem;
      color: var(--text-dim);
      margin-top: 2px
    }

    .level-section {
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-radius: var(--radius);
      padding: 18px;
      margin: 16px 0
    }

    .level-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px
    }

    .level-bar .progress-bar {
      flex: 1
    }

    .level-bar .level-text {
      font-size: .82rem;
      color: var(--text-dim);
      white-space: nowrap
    }

    .achievements-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 16px
    }

    .achievement-card {
      background: var(--surface);
      border: 1px solid var(--surface3);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      transition: all .3s
    }

    .achievement-card.unlocked {
      border-color: var(--gold-dim);
      background: linear-gradient(135deg, var(--surface), var(--gold-glow))
    }

    .achievement-card.locked {
      opacity: .4
    }

    .achievement-card .ach-icon {
      font-size: 1.8rem;
      margin-bottom: 6px
    }

    .achievement-card .ach-name {
      font-weight: 600;
      font-size: .85rem
    }

    .achievement-card .ach-desc {
      font-size: .72rem;
      color: var(--text-dim);
      margin-top: 3px
    }

    .daily-card {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 24px;
      text-align: center;
      margin-top: 16px
    }

    .daily-card h3 {
      color: var(--gold);
      margin-bottom: 6px
    }

    #toast-container {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      width: calc(100% - 32px);
      max-width: 380px
    }

    .toast {
      background: rgba(24, 20, 16, .95);
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn .4s var(--ease) forwards;
      pointer-events: auto;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .5);
      backdrop-filter: blur(12px)
    }

    .toast .toast-icon {
      font-size: 1.3rem;
      flex-shrink: 0
    }

    .toast .toast-text {
      font-size: .82rem;
      line-height: 1.4
    }

    .toast .toast-text strong {
      color: var(--gold);
      display: block;
      font-size: .88rem;
      margin-bottom: 2px
    }

    .toast.out {
      animation: toastOut .3s var(--ease) forwards
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      overflow: hidden
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      top: -10px;
      animation: confettiFall 2.5s var(--ease) forwards
    }

    .sound-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 101;
      background: var(--surface2);
      border: 1px solid var(--surface3);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      transition: all .2s
    }

    .sound-toggle:hover {
      border-color: var(--gold);
      color: var(--gold)
    }

    .sound-toggle.muted {
      opacity: .5
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px
    }

    .question {
      font-size: 1.05rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 18px;
      color: var(--text)
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px
    }

    .hints-area {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes fadeScale {
      from {
        opacity: 0;
        transform: scale(.8)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes fragmentReveal {
      0% {
        transform: scale(.5) rotate(-10deg);
        opacity: 0
      }

      50% {
        transform: scale(1.08) rotate(2deg)
      }

      100% {
        transform: scale(1) rotate(0);
        opacity: 1
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-16px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes toastOut {
      to {
        opacity: 0;
        transform: translateY(-16px)
      }
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0
      }
    }

    @keyframes shake {

        question: 'Em que país estão estas pinturas?',
        options: ['Argélia', 'Egito', 'Líbia', 'Marrocos'],

    var LEVELS = [

    ];

    var ACHIEVEMENTS = [
      { id: 'first_step', name: 'Primeiro Passo', desc: 'Resolva o seu primeiro enigma', icon: '◈', c: function (s) { return s.solved.length >= 1 } },
      { id: 'explorer', name: 'Descobridor de Origens', desc: 'Complete o Mundo 1', icon: '☀', c: function (s) { return s.solved.filter(function (e) { return e.startsWith('w1') }).length >= 5 } },
      { id: 'eagle_eye', name: 'Olho de Águia', desc: 'Acerte 3 enigmas na 1ª tentativa', icon: '◉', c: function (s) { return s.firstTries >= 3 } },
      { id: 'persistent', name: 'Incansável', desc: 'Jogue 3 dias consecutivos', icon: '♥', c: function (s) { return s.streak >= 3 } },
      { id: 'curious', name: 'Curioso', desc: 'Abra o contexto de 3 enigmas', icon: '◎', c: function (s) { return s.contextsRead >= 3 } },
      { id: 'fast', name: 'Raio', desc: 'Acerte um enigma em menos de 10s', icon: '⚡', c: function (s) { return s.fastSolves >= 1 } },
      { id: 'hintless', name: 'Sábio Sem Queres saber mais?', desc: 'Resolva 2 enigmas sem dicas', icon: '✧', c: function (s) { return s.noHintSolves >= 2 } },
      { id: 'collector', name: 'Colecionador', desc: 'Recolha todos os 5 fragmentos', icon: '◆', c: function (s) { return s.solved.filter(function (e) { return e.startsWith('w1') }).length >= 5 } },
      { id: 'daily_warrior', name: 'Desafiante Diário', desc: 'Complete um desafio diário', icon: '☆', c: function (s) { return s.dailyDone >= 1 } },
      { id: 'speed_reader', name: 'Veloz da Savana', desc: 'Complete 3 enigmas rápidos', icon: '🐎', c: function (s) { return s.fastSolves >= 3 } }
    ];

    /* ======================================
       STATE
       ====================================== */
    var S = {
      name: '', points: 0, solved: [], firstTries: 0, noHintSolves: 0, fastSolves: 0,
      hintsUsed: {}, attempts: {}, contextsRead: 0, achievements: [],
      streak: 0, lastPlayDate: null, dailyDone: 0, dailyDate: null,
      screen: 'landing', screenData: {}, soundOn: true, ctxReadThis: {}
    };

    var enigmaLocked = false;
    var enigmaStartTime = 0;
    var contextOpened = false;

    /* ======================================
       SAVE / LOAD — FIXED
       ====================================== */
    function save() {
      try {
        localStorage.setItem('sankofa_v4', JSON.stringify(S));
      } catch (e) { /* ignore */ }
    }

    function load() {
      try {
        var raw = localStorage.getItem('sankofa_v4');
        if (!raw) { raw = localStorage.getItem('sankofa_v3'); }
        if (!raw) { raw = localStorage.getItem('sankofa_v2'); }
        if (!raw) { raw = localStorage.getItem('sankofa'); }
        if (raw) {
          var d = JSON.parse(raw);
          if (d) {
            for (var k in d) {
              if (d.hasOwnProperty(k)) {
                S[k] = d[k];
              }
            }
          }
        }
      } catch (e) { /* ignore corrupt data */ }
    }

    /* ======================================
       HELPERS
       ====================================== */
    function getLevel() {
      for (var i = LEVELS.length - 1; i >= 0; i--) {
        if (S.points >= LEVELS[i].min) return LEVELS[i];
      }
      return LEVELS[0];
    }

    function getNextLevel() {
      var c = getLevel();
      for (var i = 0; i < LEVELS.length; i++) {
        if (LEVELS[i].level === c.level + 1) return LEVELS[i];
      }
      return null;
    }

    function isSolved(id) { return S.solved.indexOf(id) !== -1; }

    function getEnigma(id) {
      for (var i = 0; i < ENIGMAS.length; i++) {
        if (ENIGMAS[i].id === id) return ENIGMAS[i];
      }
      return null;
    }

    function getWorldProgress(wid) {
      var total = 0, done = 0;
      for (var i = 0; i < ENIGMAS.length; i++) {
        if (ENIGMAS[i].world === wid) {
          total++;
          if (isSolved(ENIGMAS[i].id)) done++;
        }
      }
      return { total: total, done: done, pct: total ? Math.round(done / total * 100) : 0 };
    }

    /* ======================================
       AUDIO
       ====================================== */
    var audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { /* no audio */ }
      }
    }

    function playTone(f, d, type, v) {
      if (!S.soundOn) return;
      type = type || 'sine'; v = v || 0.12;
      try {
        ensureAudio();
        var o = audioCtx.createOscillator();
        var g = audioCtx.createGain();
        o.type = type; o.frequency.value = f;
        g.gain.value = v;
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
      } catch (e) { /* no audio */ }
    }

    function sfxCorrect() {
      playTone(523, 0.1);
      setTimeout(function () { playTone(659, 0.1); }, 90);
      setTimeout(function () { playTone(784, 0.18); }, 180);
    }

    function sfxWrong() { playTone(200, 0.28, 'sawtooth', 0.06); }
    function sfxClick() { playTone(800, 0.04, 'sine', 0.05); }

    function sfxAchievement() {
      playTone(523, 0.08);
      setTimeout(function () { playTone(659, 0.08); }, 80);
      setTimeout(function () { playTone(784, 0.08); }, 160);
      setTimeout(function () { playTone(1047, 0.25); }, 240);

       UI HELPERS
       ====================================== */
    function updateSoundBtn() {
      var b = document.getElementById('sound-toggle');
      if (!b) return;
      b.textContent = S.soundOn ? '🔊' : '🔇';
      if (S.soundOn) { b.classList.remove('muted'); }
      else { b.classList.add('muted'); }
    }

    function goTo(screen, data) {
      data = data || {};
      enigmaLocked = false;
      contextOpened = false;
      S.screen = screen;
      S.screenData = data;
      save();
      var a = document.getElementById('app');
      a.classList.add('fade-out');
      setTimeout(function () {
        render();
        a.classList.remove('fade-out');
        window.scrollTo(0, 0);
      }, 300);
    }

    function showToast(icon, title, text) {
      var c = document.getElementById('toast-container');
      if (!c) return;
      var t = document.createElement('div');
      t.className = 'toast';
      t.innerHTML = '<span class="toast-icon">' + icon + '</span>' +
        '<span class="toast-text"><strong>' + title + '</strong>' + text + '</span>';
      c.appendChild(t);
      setTimeout(function () {
        t.classList.add('out');
        setTimeout(function () { t.remove(); }, 350);
      }, 3500);
    }

    function spawnConfetti() {
      var c = document.createElement('div');
      c.className = 'confetti-container';
      document.body.appendChild(c);
      var cols = ['#c9a84c', '#b85a3a', '#4a8a50', '#2a4570', '#ede5d5'];
      for (var i = 0; i < 35; i++) {
        var p = document.createElement('div');
        p.className = 'confetti';
        p.style.left = Math.random() * 100 + '%';
        p.style.background = cols[Math.floor(Math.random() * cols.length)];
        p.style.animationDelay = Math.random() * 0.6 + 's';
        p.style.animationDuration = (1.5 + Math.random() * 1.2) + 's';
        p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        c.appendChild(p);
      }
      setTimeout(function () { c.remove(); }, 3500);
    }

    function checkAchievements() {
      for (var i = 0; i < ACHIEVEMENTS.length; i++) {
        var a = ACHIEVEMENTS[i];
        if (S.achievements.indexOf(a.id) === -1 && a.c(S)) {
          S.achievements.push(a.id);
          save();
          sfxAchievement();
          showToast(a.icon, 'Conquista Desbloqueada!', a.name);
        }
      }
    }

    function getDailyEnigma() {
      var solved = [];
      for (var i = 0; i < ENIGMAS.length; i++) {
        if (isSolved(ENIGMAS[i].id)) solved.push(ENIGMAS[i]);
      }
      if (solved.length === 0) return ENIGMAS[0];
      var d = new Date();
      var seed = d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
      return solved[seed % solved.length];
    }

    function isDailyDone() {
      var today = new Date().toISOString().slice(0, 10);
      return S.dailyDate === today;
    }

    function updateStreak() {
      var today = new Date().toISOString().slice(0, 10);
      if (S.lastPlayDate === today) return;
      var yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
      if (S.lastPlayDate === yesterday) { S.streak++; }
      else { S.streak = 1; }
      S.lastPlayDate = today;
      save();
    }

    /* ======================================
       RENDER
       ====================================== */
    function render() {
      var app = document.getElementById('app');
      switch (S.screen) {

        case 'map': app.innerHTML = rMap(); break;
        case 'world': app.innerHTML = rWorld(); break;
        case 'enigma': app.innerHTML = rEnigma(); break;
        case 'result': app.innerHTML = rResult(); break;
        case 'mosaic': app.innerHTML = rMosaic(); break;
        case 'profile': app.innerHTML = rProfile(); break;
        case 'achievements': app.innerHTML = rAchievements(); break;
        case 'daily': app.innerHTML = rDaily(); break;
        default: app.innerHTML = rLanding();
      }
      attachEvents();
      updateSoundBtn();
    }

    /* ======================================
       SCREENS

        '<button class="btn btn-gold" data-act="register">Entrar</button>' +
        '</div>';

    function rMap() {
      var html = '<div class="section-header" style="margin-bottom:14px">' +
        '<h2 style="font-size:1.2rem">Mundos</h2>' +
        '<span class="badge badge-gold">' + S.points + ' pts</span></div>' +

          html += '<div class="world-card unlocked" data-act="open-world" data-w="' + w.id + '">' +

    function rWorld() {
      var wid = S.screenData.world || 1;

      var html = '<button class="btn btn-ghost btn-sm" data-act="go-map" style="margin-bottom:14px">← Voltar ao Mapa</button>';
      html += '<div style="text-align:center;margin-bottom:16px">';
      html += '<div style="font-size:.78rem;color:var(--text-muted)">Mundo ' + w.id + ' · ' + w.vol + '</div>';
      html += '<h2 style="font-size:1.6rem;margin:3px 0">' + w.name + '</h2>';
      html += '<div style="color:var(--text-dim);font-size:.88rem">' + w.period + '</div>';
      html += '<div style="margin-top:10px"><div class="progress-bar" style="max-width:220px;margin:0 auto"><div class="progress-fill" style="width:' + p.pct + '%"></div></div>';
      html += '<div style="font-size:.78rem;color:var(--text-dim);margin-top:3px">' + p.done + '/' + p.total + ' · ' + p.pct + '%</div></div></div>';

      if (p.done === p.total) {
        html += '<div style="text-align:center;margin-bottom:14px"><button class="btn btn-gold btn-sm" data-act="open-mosaic" data-w="' + wid + '">Ver Mosaico Completo</button></div>';
      }

      html += '<div class="enigma-list">';
      for (var i = 0; i < we.length; i++) {
        var e = we[i];
        var s = isSolved(e.id);
        var prev = (i === 0) || isSolved(we[i - 1].id);
        var av = !s && prev;
        var pts = S.attempts[e.id] === 1 ? 100 : (S.attempts[e.id] === 2 ? 50 : 25);
        html += '<div class="enigma-item"' + (av ? ' data-act="open-enigma" data-e="' + e.id + '"' : '') +
          ' style="' + (av ? '' : 'opacity:.5') + '">';
        html += '<div class="en-num ' + (s ? 'solved' : (av ? 'available' : 'locked')) + '">' + (s ? '✓' : (i + 1)) + '</div>';
        html += '<div class="en-info"><div class="en-title">' + e.title + '</div>';
        html += '<div class="en-sub">' + (s ? 'Recolhido' : (av ? 'Disponível' : 'Resolve o anterior')) + '</div></div>';
        if (s) html += '<span class="en-pts">+' + pts + '</span>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function rEnigma() {
      var eid = S.screenData.enigma;
      var e = getEnigma(eid);
      if (!e) return rMap();
      var hu = S.hintsUsed[eid] || 0;
      var at = S.attempts[eid] || 0;
      var basePts = at === 0 ? 100 : (at === 1 ? 50 : 25);

      var enIdx = 0;
      var worldEnigmas = [];
      for (var i = 0; i < ENIGMAS.length; i++) {
        if (ENIGMAS[i].world === e.world) worldEnigmas.push(ENIGMAS[i]);
      }
      for (var i = 0; i < worldEnigmas.length; i++) {
        if (worldEnigmas[i].id === eid) { enIdx = i + 1; break; }
      }

      var html = '<button class="btn btn-ghost btn-sm" data-act="open-world" data-w="' + e.world + '" style="margin-bottom:14px">← Mundo ' + e.world + '</button>';
      html += '<div style="text-align:center;margin-bottom:8px"><span class="badge badge-gold">Enigma ' + enIdx + ' · Mundo ' + e.world + '</span></div>';
      html += '<div style="text-align:center;margin-bottom:4px"><h2 style="font-size:1.4rem">' + e.title + '</h2></div>';
      html += '<div class="intro-line">' + e.intro + '</div>';
      html += '<div class="context-area">';
      html += '<button class="context-toggle" data-act="toggle-context" id="ctx-btn">📖 Queres saber mais?</button>';
      html += '<div class="context-panel" id="ctx-panel"><div class="context-content">' + e.context + '</div></div>';
      html += '</div>';
      html += '<div class="question">' + e.question + '</div>';
      html += '<div id="opts" class="options">';
      for (var i = 0; i < e.options.length; i++) {
        html += '<div class="option" data-act="pick" data-i="' + i + '"><span class="opt-letter">' + String.fromCharCode(65 + i) + '</span>' + e.options[i] + '</div>';
      }
      html += '</div>';
      html += '<div id="hints" class="hints-area">';
      if (hu >= 1) html += '<div class="hint-box">💡 ' + e.hints[0] + '</div>';
      if (hu >= 2) html += '<div class="hint-box">💡 ' + e.hints[1] + '</div>';
      if (hu >= 3) html += '<div class="hint-box">💡 ' + e.hints[2] + '</div>';
      if (hu < 3) html += '<button class="hint-btn" data-act="hint" data-e="' + eid + '">🗝️ Pedir Dica ' + (hu + 1) + (hu > 0 ? ' (-10 pts)' : '') + '</button>';
      html += '</div>';
      html += '<div id="fb"></div>';
      html += '<div style="text-align:center;font-size:.82rem;color:var(--text-muted);margin-top:8px">Pontos: <strong style="color:var(--gold)">' + Math.max(0, basePts - hu * 10) + '</strong> · Tentativa ' + (at + 1) + '</div>';
      return html;
    }

    function rResult() {
      var eid = S.screenData.enigma;
      var e = getEnigma(eid);
      var pts = S.screenData.points || 0;
      if (!e) return rMap();
      return '<div class="result">' +
        '<h2 style="color:var(--green)">Fragmento Recolhido!</h2>' +
        '<div class="points-earned">+' + pts + '</div>' +
        '<div class="fragment-preview ' + e.fragment.pattern + '"></div>' +
        '<h3 style="margin-top:4px">' + e.fragment.name + '</h3>' +
        '<div class="explanation">' + e.explanation + '</div>' +
        '<div style="background:var(--surface2);padding:14px;border-radius:var(--radius);width:100%;text-align:left;font-size:.88rem;color:var(--text-dim);border-left:3px solid var(--terra)">' +
        '<strong style="color:var(--terra)">Curiosidade:</strong> ' + e.curiosity + '</div>' +
        '<button class="btn btn-gold" data-act="continue-result">Continuar</button>' +
        '</div>';
    }

    function rMosaic() {
      var wid = S.screenData.world || 1;
      var we = [];
      for (var i = 0; i < ENIGMAS.length; i++) { if (ENIGMAS[i].world === wid) we.push(ENIGMAS[i]); }
      var p = getWorldProgress(wid);
      var wName = '';
      for (var i = 0; i < WORLDS.length; i++) { if (WORLDS[i].id === wid) { wName = WORLDS[i].name; break; } }

      var html = '<button class="btn btn-ghost btn-sm" data-act="open-world" data-w="' + wid + '" style="margin-bottom:14px">← Mundo ' + wid + '</button>';
      html += '<div style="text-align:center;margin-bottom:16px"><h2 style="font-size:1.4rem">Mosaico: ' + wName + '</h2>';
      html += '<p style="color:var(--text-dim);font-size:.88rem;margin-top:3px">' + p.done + '/' + p.total + ' · ' + p.pct + '%</p></div>';
      html += '<div class="fragment-grid">';
      for (var i = 0; i < we.length; i++) {
        var e = we[i];
        var s = isSolved(e.id);
        html += '<div class="fragment ' + (s ? 'unlocked ' + e.fragment.pattern : 'locked') + '" style="' + (s ? 'animation-delay:' + (i * 0.15) + 's' : '') + '">';
        if (s) html += '<span class="frag-label">' + e.fragment.name + '</span>';
        html += '</div>';
      }
      html += '</div>';
      if (p.done === p.total) {
        html += '<div style="text-align:center;margin-top:20px;padding:18px;background:linear-gradient(135deg,var(--gold-glow),var(--surface));border:1px solid var(--gold-dim);border-radius:var(--radius-lg)">';
        html += '<h3 style="color:var(--gold)">Mosaico Completo!</h3>';
        html += '<p style="color:var(--text-dim);font-size:.88rem;margin-top:4px">A história foi restaurada.</p></div>';
      }
      return html;
    }

    function rProfile() {
      var lvl = getLevel();
      var next = getNextLevel();
      var pct = next ? Math.round((S.points - lvl.min) / (next.min - lvl.min) * 100) : 100;

      var html = '<div class="profile-header"><div class="avatar">' + (S.name ? S.name.charAt(0).toUpperCase() : '?') + '</div>';
      html += '<h2>' + (S.name || 'Viajante') + '</h2>';
      html += '<div class="title">' + lvl.title + '</div></div>';
      html += '<div class="level-section"><div style="display:flex;justify-content:space-between;align-items:center">';
      html += '<span style="font-size:.82rem;color:var(--text-dim)">Nível ' + lvl.level + '</span>';
      html += next ? '<span style="font-size:.78rem;color:var(--text-muted)">Próximo: ' + next.title + '</span>' : '<span style="font-size:.78rem;color:var(--gold)">Máximo!</span>';
      html += '</div><div class="level-bar"><div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
      html += '<span class="level-text">' + S.points + ' pts</span></div></div>';
      html += '<div class="stats-grid">';
      html += '<div class="stat-card"><div class="stat-val">' + S.points + '</div><div class="stat-label">Pontos</div></div>';
      html += '<div class="stat-card"><div class="stat-val">' + S.solved.length + '</div><div class="stat-label">Enigmas</div></div>';
      html += '<div class="stat-card"><div class="stat-val">' + S.firstTries + '</div><div class="stat-label">1ª Tentativa</div></div>';
      html += '<div class="stat-card"><div class="stat-val">' + S.streak + '</div><div class="stat-label">Sequência</div></div>';
      html += '<div class="stat-card"><div class="stat-val">' + S.achievements.length + '/' + ACHIEVEMENTS.length + '</div><div class="stat-label">Conquistas</div></div>';
      html += '<div class="stat-card"><div class="stat-val">' + S.contextsRead + '</div><div class="stat-label">Contextos Lidos</div></div>';
      html += '</div>';
      html += '<button class="btn btn-outline btn-block" data-act="go-ach">Ver Conquistas</button>';
      html += '<button class="btn btn-ghost btn-block" data-act="reset" style="margin-top:8px;font-size:.8rem;color:var(--text-muted)">Recomeçar do Zero</button>';
      return html;
    }

    function rAchievements() {
      var html = '<button class="btn btn-ghost btn-sm" data-act="go-profile" style="margin-bottom:14px">← Perfil</button>';
      html += '<div class="section-header"><h2 style="font-size:1.2rem">Conquistas</h2><span class="badge badge-gold">' + S.achievements.length + '/' + ACHIEVEMENTS.length + '</span></div>';
      html += '<div class="achievements-grid">';
      for (var i = 0; i < ACHIEVEMENTS.length; i++) {
        var a = ACHIEVEMENTS[i];
        var u = S.achievements.indexOf(a.id) !== -1;
        html += '<div class="achievement-card ' + (u ? 'unlocked' : 'locked') + '">';
        html += '<div class="ach-icon">' + a.icon + '</div>';
        html += '<div class="ach-name">' + a.name + '</div>';
        html += '<div class="ach-desc">' + a.desc + '</div>';
        html += u ? '<div style="font-size:.68rem;color:var(--green);margin-top:5px">✓ Desbloqueada</div>' : '<div style="font-size:.68rem;color:var(--text-muted);margin-top:5px">🔒</div>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function rDaily() {
      var daily = getDailyEnigma();
      var done = isDailyDone();
      var has = false;
      for (var i = 0; i < ENIGMAS.length; i++) { if (isSolved(ENIGMAS[i].id)) { has = true; break; } }

      var wName = '';
      for (var i = 0; i < WORLDS.length; i++) { if (WORLDS[i].id === daily.world) { wName = WORLDS[i].name; break; } }

      var html = '<div class="section-header" style="margin-bottom:14px"><h2 style="font-size:1.2rem">Desafio Diário</h2></div>';
      html += '<div class="daily-card"><h3>⭐ Desafio de Hoje</h3>';
      html += '<div style="font-size:.88rem;color:var(--text-dim);margin-bottom:12px">Sequência: ' + S.streak + ' dia' + (S.streak !== 1 ? 's' : '') + '</div>';

      if (done) {
        html += '<div style="padding:16px;text-align:center"><div style="font-size:2.2rem;margin-bottom:6px">✓</div>';
        html += '<p style="color:var(--green);font-weight:600">Completaste o desafio de hoje!</p>';
        html += '<p style="color:var(--text-dim);font-size:.88rem;margin-top:4px">Volta amanhã.</p></div>';
      } else if (!has) {
        html += '<div style="padding:16px;text-align:center"><p style="color:var(--terra);font-size:.92rem">Resolve um enigma primeiro para desbloquear.</p></div>';
      } else {
        html += '<div style="text-align:left;margin-top:12px">';
        html += '<div style="font-size:.82rem;color:var(--text-muted);margin-bottom:4px">Mundo ' + daily.world + ' · ' + wName + '</div>';
        html += '<h4 style="font-size:1.05rem;margin-bottom:10px">' + daily.title + '</h4>';
        html += '<p style="font-size:.88rem;color:var(--text-dim);line-height:1.6;margin-bottom:14px">' + daily.intro + '</p>';
        html += '<button class="btn btn-gold btn-block" data-act="start-daily" data-e="' + daily.id + '">Aceitar o Desafio (+150 pts)</button></div>';
      }
      html += '</div>';
      return html;
    }

    /* ======================================
       EVENTS
       ====================================== */
    function attachEvents() {
      var els = document.querySelectorAll('[data-act]');
      for (var i = 0; i < els.length; i++) {
        els[i].addEventListener('click', handleAction);
      }
      var ni = document.getElementById('name-input');
      if (ni) {
        ni.addEventListener('keydown', function (e) { if (e.key === 'Enter') handleRegister(); });
        if (S.name) ni.value = S.name;
        setTimeout(function () { ni.focus(); }, 350);
      }
      document.addEventListener('keydown', handleKey);
    }

    function handleKey(e) {
      if (S.screen !== 'enigma' || enigmaLocked) return;
      var map = { a: 0, b: 1, c: 2, d: 3 };
      var idx = map[e.key.toLowerCase()];
      if (idx !== undefined) {
        var opts = document.querySelectorAll('#opts .option');
        if (opts[idx]) handlePick(idx);
      }
    }

    function handleAction(e) {
      var el = e.currentTarget;
      var act = el.getAttribute('data-act');
      sfxClick();

      switch (act) {
        case 'start': goTo('register'); break;
        case 'register': handleRegister(); break;
        case 'go-map': goTo('map'); break;
        case 'go-profile': goTo('profile'); break;
        case 'go-ach': goTo('achievements'); break;
        case 'open-world': goTo('world', { world: parseInt(el.getAttribute('data-w')) }); break;
        case 'open-enigma': enigmaLocked = false; goTo('enigma', { enigma: el.getAttribute('data-e') }); break;
        case 'open-mosaic': goTo('mosaic', { world: parseInt(el.getAttribute('data-w')) }); break;
        case 'pick': handlePick(parseInt(el.getAttribute('data-i'))); break;
        case 'hint': handleHint(el.getAttribute('data-e')); break;
        case 'toggle-context': toggleContext(); break;
        case 'continue-result':
          var en = getEnigma(S.screenData.enigma);
          goTo('world', { world: en ? en.world : 1 });
          break;
        case 'start-daily':
          enigmaLocked = false;
          goTo('enigma', { enigma: el.getAttribute('data-e'), isDaily: true });
          break;
        case 'reset':
          if (confirm('Tens a certeza? Todo o progresso será apagado.')) {
            localStorage.removeItem('sankofa_v4');
            localStorage.removeItem('sankofa_v3');
            localStorage.removeItem('sankofa_v2');
            localStorage.removeItem('sankofa');
            location.reload();
          }
          break;
      }
    }

    function handleRegister() {
      var input = document.getElementById('name-input');
      var name = input ? input.value.trim() : '';
      if (!name) {
        if (input) input.style.borderColor = 'var(--danger)';
        return;
      }
      S.name = name;
      updateStreak();
      save();
      goTo('map');
    }

    /* ======================================
       CONTEXT TOGGLE
       ====================================== */
    function toggleContext() {
      var btn = document.getElementById('ctx-btn');
      var panel = document.getElementById('ctx-panel');
      if (!btn || !panel) return;
      contextOpened = !contextOpened;
      if (contextOpened) { btn.classList.add('open'); panel.classList.add('open'); }
      else { btn.classList.remove('open'); panel.classList.remove('open'); }
      btn.innerHTML = contextOpened ? '📖 Fechar contexto' : '📖 Queres saber mais?';
      if (contextOpened) {
        var eid = S.screenData.enigma;
        if (!S.ctxReadThis[eid]) {
          S.ctxReadThis[eid] = true;
          S.contextsRead = (S.contextsRead || 0) + 1;
          save();
          checkAchievements();
        }
      }
    }

    /* ======================================
       ENIGMA LOGIC
       ====================================== */
    function handlePick(idx) {
      if (enigmaLocked) return;
      enigmaLocked = true;

      var eid = S.screenData.enigma;
      var e = getEnigma(eid);
      if (!e) return;

      var elapsed = Math.round((Date.now() - enigmaStartTime) / 1000);

      var opts = document.querySelectorAll('#opts .option');
      for (var i = 0; i < opts.length; i++) { opts[i].classList.remove('selected'); }
      opts[idx].classList.add('selected');

      var correct = (idx === e.correct);
      var attempts = (S.attempts[eid] || 0) + 1;
      S.attempts[eid] = attempts;

      if (correct) {
        var hu = S.hintsUsed[eid] || 0;
        var pts = attempts === 1 ? 100 : (attempts === 2 ? 50 : 25);
        pts = Math.max(0, pts - hu * 10);
        if (S.screenData.isDaily && !isDailyDone()) {
          pts += 150;
          S.dailyDone = (S.dailyDone || 0) + 1;
          S.dailyDate = new Date().toISOString().slice(0, 10);
        }
        S.points += pts;
        if (S.solved.indexOf(eid) === -1) S.solved.push(eid);
        if (attempts === 1) S.firstTries++;
        if (hu === 0) S.noHintSolves++;
        if (elapsed < 10) S.fastSolves = (S.fastSolves || 0) + 1;

        opts[idx].classList.add('correct');
        for (var i = 0; i < opts.length; i++) {
          if (i !== idx) opts[i].classList.add('locked');
        }
        sfxCorrect();
        spawnConfetti();

        var fb = document.getElementById('fb');
        if (fb) fb.innerHTML = '<div class="feedback correct">✓ Correto! +' + pts + ' pontos' + (elapsed < 10 ? ' ⚡' : '') + '</div>';

        checkAchievements();
        save();

        setTimeout(function () {
          enigmaLocked = false;
          goTo('result', { enigma: eid, points: pts });
        }, 1800);

      } else {
        opts[idx].classList.add('wrong');
        sfxWrong();

        var fb = document.getElementById('fb');
        if (fb) fb.innerHTML = '<div class="feedback wrong">✗ Não é esta. Tenta de novo!</div>';

        save();
        setTimeout(function () {
          opts[idx].classList.remove('wrong', 'selected');
          enigmaLocked = false;
        }, 1000);
      }
    }

    function handleHint(eid) {
      var used = S.hintsUsed[eid] || 0;
      if (used >= 3) return;
      S.hintsUsed[eid] = used + 1;
      if (used > 0) S.points = Math.max(0, S.points - 10);
      save();
      sfxClick();
      goTo('enigma', S.screenData);
    }

    /* ======================================
       INIT
       ====================================== */
    function init() {
      load();
      updateSoundBtn();

      document.getElementById('sound-toggle').addEventListener('click', function () {
        S.soundOn = !S.soundOn;
        save();
        updateSoundBtn();
        sfxClick();
      });

      if (S.name) {
        updateStreak();
        enigmaStartTime = Date.now();
        var target = S.screen === 'landing' ? 'map' : S.screen;
        goTo(target, S.screenData);
      } else {
        render();
      }
    }

    init();
  </script>
</body>

</html>
