  <script>
    (function () {
      var t = localStorage.getItem("sankofa_theme");
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>

  <!-- Liga global: src/league-config.js (gitignored) injeta SUPABASE_URL+anonKey.
       Sem ele, a Liga online fica oculta e a Liga local continua a funcionar. -->
  <script src="src/league-config.js" onerror="this.remove()"></script>
  <script>window.SANKOFA_LEAGUE_CONFIG = window.SANKOFA_LEAGUE_CONFIG || null;</script>
  <script src="src/league.js"></script>

  <script>
    // Service Worker — auto-update agressivo:
    //   updateViaCache:"none" força browser a sempre buscar /sw.js fresh.
    //   reg.update() no load + visibilitychange + intervalo 1h.
    //   Quando novo SW termina install, pede SKIP_WAITING.
    //   controllerchange → reload 1x para servir bytes novos.
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        var didReload = false;
        var currentVersion = window.SANKOFA_VERSION || "0.0.0";

        function clearSankofaCaches() {
          if (!window.caches || !caches.keys) return Promise.resolve();
          return caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (key) {
              if (key.indexOf("sankofa-") === 0) return caches.delete(key);
            }));
          });
        }

        function remoteVersionFrom(js) {
          var m = String(js || "").match(/SANKOFA_VERSION\s*=\s*["']([^"']+)["']/);
          return m ? m[1] : "";
        }

        function reloadForUpdate(version) {
          if (didReload) return;
          didReload = true;
          clearSankofaCaches().finally(function () {
            var url = new URL(window.location.href);
            url.searchParams.set("v", version || Date.now());
            window.location.replace(url.toString());
          });
        }

        function checkPublishedVersion(reg) {
          fetch("/data/version.js?check=" + Date.now(), {
            cache: "no-store",
            headers: { "Cache-Control": "no-cache" }
          }).then(function (res) {
            return res.ok ? res.text() : "";
          }).then(function (js) {
            var remoteVersion = remoteVersionFrom(js);
            if (!remoteVersion || remoteVersion === currentVersion) return;
            if (reg) {
              reg.update().catch(function () {});
              if (reg.waiting) reg.waiting.postMessage({ type: "SKIP_WAITING" });
            }
            reloadForUpdate(remoteVersion);
          }).catch(function () {});
        }

        navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" }).then(function (reg) {
          var triggerUpdate = function () {
            reg.update().catch(function () {});
            checkPublishedVersion(reg);
          };
          triggerUpdate();
          setInterval(triggerUpdate, 10 * 60 * 1000);
          document.addEventListener("visibilitychange", function () {
            if (!document.hidden) triggerUpdate();
          });
          window.addEventListener("focus", triggerUpdate);
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", function () {
              if (nw.state === "installed" && navigator.serviceWorker.controller) {
                nw.postMessage({ type: "SKIP_WAITING" });
              }
            });
          });
        }).catch(function () {});

        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (didReload) return;
          didReload = true;
          window.location.reload();
        });
      });
    }

    // beforeinstallprompt — guarda evento, app pode disparar prompt depois
    window.__sankofaInstall = null;
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      window.__sankofaInstall = e;
      var btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "flex";
    });
    window.addEventListener("appinstalled", function () {
      var btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "none";
      window.__sankofaInstall = null;
    });
  </script>
</body>
