<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sankofa — Fragmentos da África</title>
  <meta name="description" content="Jogo educativo de enigmas sobre a História Geral da África (UNESCO).">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">
  <link rel="apple-touch-icon" sizes="192x192" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="assets/icon-512.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0c0a06" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f5efe0" media="(prefers-color-scheme: light)">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sankofa">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Sankofa">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      var t = localStorage.getItem("sankofa_theme");
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      }
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</head>
<body>
  <button class="install-btn" id="install-btn" title="Instalar como app" aria-label="Instalar como app" style="display:none">⬇ Instalar</button>
  <button class="theme-toggle" id="theme-toggle" title="Modo claro/escuro" aria-label="Alternar tema">🌙</button>
  <button class="ambient-toggle" id="ambient-toggle" title="Tambor ambiente" aria-label="Ativar tambor ambiente">🥁</button>
  <button class="sound-toggle" id="sound-toggle" title="Som on/off" aria-label="Som on/off">🔊</button>

  <main id="app" aria-live="polite"></main>
  <div id="toast-container" aria-live="polite"></div>

  <script src="data/worlds.js"></script>
  <script src="data/enigmas.js"></script>
  <script src="data/levels.js"></script>
  <script src="data/achievements.js"></script>
  <script src="data/titles.js"></script>
  <script src="data/houses.js"></script>
  <script src="data/suditos.js"></script>
  <script src="data/festivals.js"></script>
  <script src="data/genealogy.js"></script>
  <script src="data/leagues.js"></script>
  <script src="src/audio.js"></script>
  <script src="src/profiles.js"></script>
  <script src="src/royalty.js"></script>
  <!-- Liga global: src/league-config.js (gitignored) injeta SUPABASE_URL+anonKey.
       Sem ele, a Liga online fica oculta e a Liga local continua a funcionar. -->
  <script src="src/league-config.js" onerror="this.remove()"></script>
  <script>window.SANKOFA_LEAGUE_CONFIG = window.SANKOFA_LEAGUE_CONFIG || null;</script>
  <script src="src/league.js"></script>
  <script src="src/app.js"></script>

  <script>
    // Service Worker — só em produção (HTTPS) ou localhost
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function () {});
      });
    }

    // beforeinstallprompt — guarda evento, app pode disparar prompt depois
    window.__sankofaInstall = null;
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      window.__sankofaInstall = e;
      var btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "flex";
    });
    window.addEventListener("appinstalled", function () {
      var btn = document.getElementById("install-btn");
      if (btn) btn.style.display = "none";
      window.__sankofaInstall = null;
    });
  </script>
</body>
</html>
